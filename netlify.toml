# =========================
# netlify.toml
# - Redirects (required)
# - Security headers (CSP + basics)
# - Cache headers for assets
# =========================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# -------------------------
# Security headers
# -------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # CSP note:
    # - We allow Google Fonts (fonts.googleapis.com + fonts.gstatic.com)
    # - We do NOT allow inline scripts generally, but some pages have tiny inline scripts.
    #   To keep this simple and working, we allow 'unsafe-inline' for scripts.
    #   Later, you can move inline scripts to external JS and remove unsafe-inline.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;"
# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker and manifest should update reliably
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"